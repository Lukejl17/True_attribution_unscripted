<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>True Attribution Analytics Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    :root {
      --dark-green: #1D271D;
      --mid-green: #808D65;
      --light-green: #B8C99E;
      --cream: #F1F4EC;
      --off-white: #F2F2F2;
      --yellow: #FAD471;
      --blue: #6A9DB3;
      --red: #D53C27;
      --success: #92A870;
      --orange: #E8A87C;
    }
    
    body {
      font-family: 'Poppins', -apple-system, sans-serif;
      background: linear-gradient(135deg, #1D271D 0%, #2a3a2a 100%);
      color: #333;
      min-height: 100vh;
      padding: 1.5rem;
    }
    
    .container {
      max-width: 1800px;
      margin: 0 auto;
    }
    
    .header {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(20px);
      border-radius: 20px;
      padding: 1.5rem 2rem;
      margin-bottom: 1.5rem;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
    }
    
    .header-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1rem;
    }
    
    h1 {
      font-size: 2rem;
      font-weight: 700;
      color: var(--dark-green);
      letter-spacing: -0.02em;
    }
    
    .week-selector {
      display: flex;
      gap: 0.75rem;
      align-items: center;
    }
    
    .week-selector label {
      font-size: 0.9rem;
      font-weight: 500;
      color: var(--dark-green);
    }
    
    .week-selector select {
      padding: 0.6rem 1rem;
      border: 2px solid var(--light-green);
      border-radius: 10px;
      font-family: 'Poppins', sans-serif;
      font-size: 0.95rem;
      font-weight: 500;
      background: white;
      color: var(--dark-green);
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .week-selector select:hover {
      border-color: var(--mid-green);
    }
    
    .tab-navigation {
      display: flex;
      gap: 0.5rem;
      border-bottom: 2px solid var(--cream);
      padding-bottom: 0;
    }
    
    .tab-button {
      padding: 0.75rem 1.5rem;
      border: none;
      background: none;
      font-family: 'Poppins', sans-serif;
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--mid-green);
      cursor: pointer;
      border-bottom: 3px solid transparent;
      transition: all 0.2s;
      position: relative;
      top: 2px;
    }
    
    .tab-button:hover {
      color: var(--dark-green);
    }
    
    .tab-button.active {
      color: var(--dark-green);
      border-bottom-color: var(--yellow);
    }
    
    .tab-content {
      display: none;
    }
    
    .tab-content.active {
      display: block;
    }
    
    .recommendations-box {
      background: linear-gradient(135deg, #D53C27 0%, #c43520 100%);
      border-radius: 16px;
      padding: 1.5rem 2rem;
      margin-bottom: 1.5rem;
      color: white;
      box-shadow: 0 4px 20px rgba(213, 60, 39, 0.3);
    }
    
    .recommendations-box h2 {
      font-size: 1.3rem;
      font-weight: 700;
      margin-bottom: 0.75rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    
    .recommendations-box h2::before {
      content: '⚠️';
      font-size: 1.5rem;
    }
    
    .recommendations-box p {
      font-size: 1rem;
      line-height: 1.6;
      opacity: 0.95;
    }
    
    .recommendations-box strong {
      font-weight: 700;
      color: var(--yellow);
    }
    
    .summary-cards {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1.25rem;
      margin-bottom: 2rem;
    }
    
    .summary-card {
      background: white;
      border-radius: 16px;
      padding: 1.75rem;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
      transition: transform 0.2s, box-shadow 0.2s;
    }
    
    .summary-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.12);
    }
    
    .summary-card-label {
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--mid-green);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 0.5rem;
    }
    
    .summary-card-value {
      font-size: 2.2rem;
      font-weight: 700;
      color: var(--dark-green);
      margin-bottom: 0.5rem;
    }
    
    .summary-card-change {
      font-size: 0.95rem;
      font-weight: 600;
      display: inline-block;
      padding: 0.25rem 0.5rem;
      border-radius: 6px;
    }
    
    .summary-card-change.positive {
      color: var(--success);
      background: rgba(146, 168, 112, 0.1);
    }
    
    .summary-card-change.negative {
      color: var(--red);
      background: rgba(213, 60, 39, 0.1);
    }
    
    .platform-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1.25rem;
      margin-bottom: 2rem;
    }
    
    .platform-card {
      background: var(--cream);
      border-radius: 16px;
      padding: 1.5rem;
      position: relative;
      overflow: hidden;
    }
    
    .platform-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
    }
    
    .platform-card.meta::before {
      background: #0084FF;
    }
    
    .platform-card.apple::before {
      background: #000000;
    }
    
    .platform-card.google::before {
      background: #4285F4;
    }
    
    .platform-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1rem;
    }
    
    .platform-name {
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--dark-green);
    }
    
    .action-badge {
      padding: 0.4rem 0.75rem;
      border-radius: 8px;
      font-size: 0.8rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }
    
    .action-badge.SCALE {
      background: var(--success);
      color: white;
    }
    
    .action-badge.HOLD {
      background: var(--yellow);
      color: var(--dark-green);
    }
    
    .action-badge.MONITOR {
      background: var(--blue);
      color: white;
    }
    
    .action-badge.PAUSED {
      background: #999;
      color: white;
    }
    
    .platform-metrics {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 0.75rem;
    }
    
    .metric-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.6rem 0;
    }
    
    .metric-label {
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--mid-green);
    }
    
    .metric-value {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--dark-green);
      font-family: 'JetBrains Mono', monospace;
    }
    
    .metric-change {
      font-size: 0.8rem;
      font-weight: 600;
      margin-left: 0.4rem;
    }
    
    .metric-change.up {
      color: var(--success);
    }
    
    .metric-change.down {
      color: var(--red);
    }
    
    .platform-note {
      margin-top: 1rem;
      padding: 0.75rem;
      background: rgba(255, 255, 255, 0.6);
      border-radius: 8px;
      font-size: 0.85rem;
      line-height: 1.5;
      color: var(--dark-green);
      display: flex;
      gap: 0.5rem;
    }
    
    .platform-note::before {
      content: '📊';
      flex-shrink: 0;
    }
    
    .comparison-charts {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 1.5rem;
    }
    
    .chart-card {
      background: white;
      border-radius: 16px;
      padding: 1.75rem;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
    }
    
    .chart-title {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--dark-green);
      margin-bottom: 1.5rem;
      text-align: center;
    }
    
    .chart-bars {
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
    }
    
    .chart-bar-row {
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    
    .chart-bar-label {
      width: 60px;
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--dark-green);
    }
    
    .chart-bar-container {
      flex: 1;
      height: 40px;
      background: var(--off-white);
      border-radius: 8px;
      position: relative;
      overflow: hidden;
    }
    
    .chart-bar-fill {
      height: 100%;
      border-radius: 8px;
      transition: width 0.8s ease-out;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding-right: 0.75rem;
    }
    
    .chart-bar-value {
      font-size: 0.9rem;
      font-weight: 700;
      color: white;
      font-family: 'JetBrains Mono', monospace;
    }
    
    .chart-bar-fill.meta {
      background: linear-gradient(90deg, #0084FF 0%, #0073e6 100%);
    }
    
    .chart-bar-fill.apple {
      background: linear-gradient(90deg, #333 0%, #000 100%);
    }
    
    .chart-bar-fill.google {
      background: linear-gradient(90deg, #4285F4 0%, #3367d6 100%);
    }
    
    .breakeven-line {
      position: absolute;
      left: 50%;
      top: 0;
      bottom: 0;
      width: 2px;
      background: var(--red);
      z-index: 1;
    }
    
    .breakeven-label {
      position: absolute;
      left: 50%;
      top: -20px;
      transform: translateX(-50%);
      font-size: 0.7rem;
      font-weight: 600;
      color: var(--red);
    }
    
    .mtd-grid {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 1.5rem;
      margin-bottom: 2rem;
    }
    
    .mtd-card {
      background: white;
      border-radius: 16px;
      padding: 2rem;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
    }
    
    .mtd-title {
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--dark-green);
      margin-bottom: 1.5rem;
    }
    
    .mtd-stats {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 1.5rem;
    }
    
    .mtd-stat {
      padding: 1rem;
      background: var(--cream);
      border-radius: 12px;
    }
    
    .mtd-stat-label {
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--mid-green);
      text-transform: uppercase;
      margin-bottom: 0.5rem;
    }
    
    .mtd-stat-value {
      font-size: 1.8rem;
      font-weight: 700;
      color: var(--dark-green);
      font-family: 'JetBrains Mono', monospace;
    }
    
    .mtd-progress {
      margin-top: 1.5rem;
      padding: 1rem;
      background: var(--off-white);
      border-radius: 12px;
    }
    
    .mtd-progress-label {
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--dark-green);
      margin-bottom: 0.5rem;
    }
    
    .mtd-progress-bar {
      height: 12px;
      background: var(--cream);
      border-radius: 6px;
      overflow: hidden;
      margin-bottom: 0.5rem;
    }
    
    .mtd-progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--success) 0%, var(--light-green) 100%);
      transition: width 0.8s ease-out;
    }
    
    .mtd-progress-text {
      font-size: 0.8rem;
      color: var(--mid-green);
    }
    
    .mtd-projection {
      background: linear-gradient(135deg, var(--dark-green) 0%, #2a3a2a 100%);
      color: white;
    }
    
    .mtd-projection .mtd-title {
      color: white;
    }
    
    .mtd-projection-item {
      padding: 1rem;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      margin-bottom: 1rem;
    }
    
    .mtd-projection-item:last-child {
      margin-bottom: 0;
    }
    
    .mtd-projection-label {
      font-size: 0.85rem;
      font-weight: 500;
      opacity: 0.8;
      margin-bottom: 0.5rem;
    }
    
    .mtd-projection-value {
      font-size: 1.6rem;
      font-weight: 700;
      font-family: 'JetBrains Mono', monospace;
    }
    
    .funnel-section {
      background: white;
      border-radius: 16px;
      padding: 2rem;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
    }
    
    .funnel-title {
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--dark-green);
      margin-bottom: 1.5rem;
      text-align: center;
    }
    
    .funnel-columns {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 2rem;
    }
    
    .funnel-column h3 {
      font-size: 1.1rem;
      margin-bottom: 1.25rem;
      color: var(--dark-green);
      text-align: center;
      font-weight: 600;
    }
    
    .funnel-stage {
      margin-bottom: 1rem;
    }
    
    .funnel-bar {
      background: var(--cream);
      padding: 1rem 1.25rem;
      border-radius: 10px;
      position: relative;
      overflow: hidden;
      transition: transform 0.2s;
    }
    
    .funnel-bar:hover {
      transform: translateX(4px);
    }
    
    .funnel-bar-fill {
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      background: linear-gradient(90deg, var(--light-green), var(--success));
      opacity: 0.15;
      transition: width 0.8s ease-out;
    }
    
    .funnel-bar-content {
      position: relative;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .funnel-stage-name {
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--mid-green);
    }
    
    .funnel-stage-value {
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--dark-green);
      font-family: 'JetBrains Mono', monospace;
    }
    
    .funnel-rate {
      margin-top: 0.75rem;
      padding: 0.75rem;
      background: white;
      border-radius: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .funnel-rate-label {
      font-size: 0.85rem;
      color: var(--mid-green);
    }
    
    .funnel-rate-value {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--dark-green);
    }
    
    @media (max-width: 1400px) {
      .platform-grid {
        grid-template-columns: repeat(2, 1fr);
      }
      
      .comparison-charts {
        grid-template-columns: 1fr;
      }
    }
    
    @media (max-width: 900px) {
      .summary-cards,
      .platform-grid {
        grid-template-columns: 1fr;
      }
      
      .mtd-grid {
        grid-template-columns: 1fr;
      }
      
      .funnel-columns {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

        },
        apple: {
          spend: 332, spendWoW: null, installs: 92, installsWoW: null,
          cpi: 3.61, cpiWoW: null, cpt: 15.88, cptWoW: null,
          cac: 52.93, cacWoW: null, roas: 6.08, roasWoW: null,
          action: 'SCALE',
          note: 'Apple excellent at 6.08x ROAS. CPI $3.61 (best in portfolio). Clear scale opportunity.'
        },
        google: {
          spend: 0, spendWoW: 0, installs: 0, installsWoW: 0,
          cpi: 0, cpiWoW: 0, cpt: 0, cptWoW: 0,
          cac: 0, cacWoW: 0, roas: 0, roasWoW: 0,
          action: 'PAUSED',
          note: 'Not yet launched. Planning iOS test at $400/week.'
        },
        organic: {
          installs: 1153, installsWoW: null, trials: 178, trialsWoW: null,
          conversions: 51, conversionsWoW: null, subs: 24, subsWoW: null,
          installToTrial: 15.43, installToTrialWoW: null,
          trialToPaid: 42.13, trialToPaidWoW: null
        },
        totalPaid: {
          spend: 5850, installs: 505, trials: 81, conversions: 35, subs: 7,
          installsWoW: null, trialsWoW: null, conversionsWoW: null, subsWoW: null,
          cpi: 11.58, cpt: 72.50, cac: 137.63, roas: 1.51,
          installToTrial: 16.04, installToTrialWoW: null,
          trialToPaid: 43.21, trialToPaidWoW: null
        }
      }
    };

    function Dashboard() {
      const [selectedWeek, setSelectedWeek] = useState('Mar 9-15, 2026');
      const [activeTab, setActiveTab] = useState('overview');
      const data = DATA[selectedWeek];

      const formatCurrency = (value) => `A$${value.toLocaleString()}`;
      const formatPercent = (value) => `${value > 0 ? '+' : ''}${value}%`;
      const formatROAS = (value) => `${value.toFixed(2)}x`;

      const getChangeClass = (value, isROAS = false, isCost = false) => {
        if (value === null || value === 0) return '';
        if (isROAS || !isCost) {
          return value > 0 ? 'positive' : 'negative';
        }
        return value > 0 ? 'negative' : 'positive';
      };

      const renderPlatformCard = (name, platformData, colorClass) => (
        <div className={`platform-card ${colorClass}`}>
          <div className="platform-header">
            <div className="platform-name">{name}</div>
            <div className={`action-badge ${platformData.action}`}>
              {platformData.action}
            </div>
          </div>
          <div className="platform-metrics">
            <div className="metric-item">
              <span className="metric-label">Spend</span>
              <span>
                <span className="metric-value">{formatCurrency(platformData.spend)}</span>
                {platformData.spendWoW !== null && (
                  <span className={`metric-change ${platformData.spendWoW > 0 ? 'up' : 'down'}`}>
                    {formatPercent(platformData.spendWoW)}
                  </span>
                )}
              </span>
            </div>
            <div className="metric-item">
              <span className="metric-label">ROAS</span>
              <span>
                <span className="metric-value">{formatROAS(platformData.roas)}</span>
                {platformData.roasWoW !== null && platformData.roasWoW !== 0 && (
                  <span className={`metric-change ${platformData.roasWoW > 0 ? 'up' : 'down'}`}>
                    {formatPercent(platformData.roasWoW)}
                  </span>
                )}
              </span>
            </div>
            <div className="metric-item">
              <span className="metric-label">CPI</span>
              <span>
                <span className="metric-value">{formatCurrency(platformData.cpi)}</span>
                {platformData.cpiWoW !== null && platformData.cpiWoW !== 0 && (
                  <span className={`metric-change ${platformData.cpiWoW < 0 ? 'up' : 'down'}`}>
                    {formatPercent(platformData.cpiWoW)}
                  </span>
                )}
              </span>
            </div>
            <div className="metric-item">
              <span className="metric-label">CPT</span>
              <span>
                <span className="metric-value">{platformData.cpt > 0 ? formatCurrency(platformData.cpt) : '—'}</span>
                {platformData.cptWoW !== null && platformData.cptWoW !== 0 && platformData.cpt > 0 && (
                  <span className={`metric-change ${platformData.cptWoW < 0 ? 'up' : 'down'}`}>
                    {formatPercent(platformData.cptWoW)}
                  </span>
                )}
              </span>
            </div>
            <div className="metric-item">
              <span className="metric-label">CAC</span>
              <span>
                <span className="metric-value">{platformData.cac > 0 ? formatCurrency(platformData.cac) : '—'}</span>
                {platformData.cacWoW !== null && platformData.cacWoW !== 0 && platformData.cac > 0 && (
                  <span className={`metric-change ${platformData.cacWoW < 0 ? 'up' : 'down'}`}>
                    {formatPercent(platformData.cacWoW)}
                  </span>
                )}
              </span>
            </div>
          </div>
          {platformData.note && (
            <div className="platform-note">{platformData.note}</div>
          )}
        </div>
      );

      const renderComparisonChart = (title, metric, isROAS = false) => {
        const platforms = ['meta', 'apple', 'google'].filter(p => data[p].spend > 0);
        const values = platforms.map(p => data[p][metric] || 0);
        const maxValue = Math.max(...values, isROAS ? 1 : 0);
        const scale = isROAS ? maxValue * 2 : maxValue * 1.2;

        return (
          <div className="chart-card">
            <div className="chart-title">{title}</div>
            {isROAS && <div className="breakeven-label">1.0x Break-even</div>}
            <div className="chart-bars" style={{position: 'relative'}}>
              {isROAS && <div className="breakeven-line"></div>}
              {platforms.map((platform, idx) => {
                const value = data[platform][metric] || 0;
                const width = scale > 0 ? (value / scale) * 100 : 0;
                const displayValue = metric === 'roas' ? formatROAS(value) : 
                                   (metric === 'cpi' || metric === 'cpt' || metric === 'cac') ? formatCurrency(value) : 
                                   value.toLocaleString();
                
                return (
                  <div key={idx} className="chart-bar-row">
                    <div className="chart-bar-label">{platform.charAt(0).toUpperCase() + platform.slice(1)}</div>
                    <div className="chart-bar-container">
                      <div className={`chart-bar-fill ${platform}`} style={{width: `${width}%`}}>
                        <span className="chart-bar-value">{displayValue}</span>
                      </div>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        );
      };

      const renderROASChart = () => {
        const platforms = ['meta', 'apple', 'google'].filter(p => data[p].spend > 0);
        const values = platforms.map(p => data[p].roas || 0);
        const maxROAS = Math.max(...values, 2);

        return (
          <div className="chart-card">
            <div className="chart-title">Net ROAS (1.0x = Break-even)</div>
            <div style={{position: 'relative', paddingTop: '24px'}}>
              <div style={{
                position: 'absolute', left: '50%', top: 0, bottom: 0,
                width: 2, background: 'var(--red)', zIndex: 10
              }}></div>
              <div style={{
                position: 'absolute', left: '50%', top: 2,
                transform: 'translateX(-50%)',
                fontSize: '0.7rem', fontWeight: 600, color: 'var(--red)',
                whiteSpace: 'nowrap'
              }}>1.0x break-even</div>
              <div className="chart-bars">
                {platforms.map((platform, idx) => {
                  const value = data[platform].roas || 0;
                  const isProfitable = value >= 1;
                  const displayValue = formatROAS(value);
                  let barLeft, barWidth, barStyle;
                  if (isProfitable) {
                    barLeft = 50;
                    barWidth = Math.min(((value - 1) / (maxROAS - 1)) * 50, 50);
                    barStyle = {
                      background: platform === 'apple'
                        ? 'linear-gradient(90deg, #4a9a4a, #2d7a2d)'
                        : platform === 'meta'
                        ? 'linear-gradient(90deg, #2a8aff, #006acc)'
                        : 'linear-gradient(90deg, #5a9af4, #3367d6)',
                      borderRadius: '0 8px 8px 0',
                      justifyContent: 'flex-end',
                      paddingRight: '0.75rem',
                      paddingLeft: 0
                    };
                  } else {
                    const coverage = (value / 1) * 50;
                    barLeft = coverage;
                    barWidth = 50 - coverage;
                    barStyle = {
                      background: 'linear-gradient(90deg, var(--red), #e85844)',
                      borderRadius: '8px 0 0 8px',
                      justifyContent: 'flex-start',
                      paddingLeft: '0.5rem',
                      paddingRight: 0
                    };
                  }
                  return (
                    <div key={idx} className="chart-bar-row">
                      <div className="chart-bar-label">{platform.charAt(0).toUpperCase() + platform.slice(1)}</div>
                      <div className="chart-bar-container">
                        <div style={{
                          position: 'absolute',
                          left: `${barLeft}%`,
                          width: `${barWidth}%`,
                          height: '100%',
                          display: 'flex',
                          alignItems: 'center',
                          zIndex: 5,
                          ...barStyle
                        }}>
                          <span className="chart-bar-value" style={{color: 'white'}}>{displayValue}</span>
                        </div>
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
          </div>
        );
      };

      const calculateMTD = () => {
        const weeks = Object.keys(DATA).reverse(); // Oldest to newest
        const marchWeeks = weeks.filter(w => w.includes('Mar'));
        
        const mtdSpend = marchWeeks.reduce((sum, week) => sum + DATA[week].totalSpend, 0);
        const mtdRev = marchWeeks.reduce((sum, week) => sum + DATA[week].blendedNetRev, 0);
        const mtdROAS = mtdSpend > 0 ? mtdRev / mtdSpend : 0;
        
        // Calculate days elapsed (assuming 7 days per week)
        const daysElapsed = marchWeeks.length * 7;
        const daysInMarch = 31;
        const daysRemaining = daysInMarch - daysElapsed;
        const progressPercent = (daysElapsed / daysInMarch) * 100;
        
        // Project end of month (simple linear extrapolation)
        const dailyAvgSpend = mtdSpend / daysElapsed;
        const dailyAvgRev = mtdRev / daysElapsed;
        const projectedSpend = mtdSpend + (dailyAvgSpend * daysRemaining);
        const projectedRev = mtdRev + (dailyAvgRev * daysRemaining);
        const projectedROAS = projectedSpend > 0 ? projectedRev / projectedSpend : 0;
        
        return {
          mtdSpend, mtdRev, mtdROAS, daysElapsed, daysRemaining, progressPercent,
          projectedSpend, projectedRev, projectedROAS
        };
      };

      const calculateMTDPlatform = (platformKey) => {
        const marchWeeks = Object.keys(DATA).filter(w => w.includes('Mar'));
        const mtdSpend = marchWeeks.reduce((sum, week) => sum + (DATA[week][platformKey]?.spend || 0), 0);
        const mtdInstalls = marchWeeks.reduce((sum, week) => sum + (DATA[week][platformKey]?.installs || 0), 0);
        const mtdRev = marchWeeks.reduce((sum, week) => {
          const p = DATA[week][platformKey];
          return sum + (p ? p.spend * p.roas : 0);
        }, 0);
        const mtdROAS = mtdSpend > 0 ? mtdRev / mtdSpend : 0;
        const avgCPI = mtdInstalls > 0 ? mtdSpend / mtdInstalls : 0;
        return { mtdSpend, mtdInstalls, mtdROAS, avgCPI };
      };

      const mtd = calculateMTD();

      return (
        <div className="container">
          <div className="header">
            <div className="header-top">
              <h1>True Attribution Analytics</h1>
              <div className="week-selector">
                <label>Week:</label>
                <select value={selectedWeek} onChange={(e) => setSelectedWeek(e.target.value)}>
                  {Object.keys(DATA).map(week => (
                    <option key={week} value={week}>{week}</option>
                  ))}
                </select>
              </div>
            </div>
            <div className="tab-navigation">
              <button 
                className={`tab-button ${activeTab === 'overview' ? 'active' : ''}`}
                onClick={() => setActiveTab('overview')}
              >
                Overview
              </button>
              <button 
                className={`tab-button ${activeTab === 'comparison' ? 'active' : ''}`}
                onClick={() => setActiveTab('comparison')}
              >
                Platform Comparison
              </button>
              <button
                className={`tab-button ${activeTab === 'mtd' ? 'active' : ''}`}
                onClick={() => setActiveTab('mtd')}
              >
                Month-to-Date
              </button>
              <button
                className={`tab-button ${activeTab === 'activation' ? 'active' : ''}`}
                onClick={() => setActiveTab('activation')}
              >
                Activation Rates
              </button>
            </div>
          </div>

          {data.recommendation && (
            <div className="recommendations-box">
              <h2>Week Recommendation</h2>
              <p>{data.recommendation}</p>
            </div>
          )}

          <div className={`tab-content ${activeTab === 'overview' ? 'active' : ''}`}>
            <div className="summary-cards">
              <div className="summary-card">
                <div className="summary-card-label">Total Spend</div>
                <div className="summary-card-value">{formatCurrency(data.totalSpend)}</div>
                <span className={`summary-card-change ${getChangeClass(data.spendWoW)}`}>
                  {formatPercent(data.spendWoW)} WoW
                </span>
              </div>
              <div className="summary-card">
                <div className="summary-card-label">Blended Net Revenue</div>
                <div className="summary-card-value">{formatCurrency(data.blendedNetRev)}</div>
                <span className={`summary-card-change ${getChangeClass(data.revWoW)}`}>
                  {formatPercent(data.revWoW)} WoW
                </span>
              </div>
              <div className="summary-card">
                <div className="summary-card-label">Blended Net ROAS</div>
                <div className="summary-card-value">{formatROAS(data.blendedNetROAS)}</div>
                <span className={`summary-card-change ${getChangeClass(data.roasWoW, true)}`}>
                  {formatPercent(data.roasWoW)} WoW
                </span>
              </div>
            </div>

            <div className="platform-grid">
              {renderPlatformCard('Meta', data.meta, 'meta')}
              {renderPlatformCard('Apple', data.apple, 'apple')}
              {renderPlatformCard('Google', data.google, 'google')}
            </div>

            <div className="funnel-section">
              <div className="funnel-title">Conversion Funnel: Organic vs Paid</div>
              <div className="funnel-columns">
                <div className="funnel-column">
                  <h3>Organic</h3>
                  {['installs', 'trials', 'conversions', 'subs'].map(stage => {
                    const maxValue = stage === 'installs' ? 1500 : stage === 'trials' ? 300 : stage === 'conversions' ? 100 : 60;
                    const width = (data.organic[stage] / maxValue) * 100;
                    return (
                      <div key={stage} className="funnel-stage">
                        <div className="funnel-bar">
                          <div className="funnel-bar-fill" style={{width: `${width}%`}}></div>
                          <div className="funnel-bar-content">
                            <span className="funnel-stage-name">
                              {stage.charAt(0).toUpperCase() + stage.slice(1)}
                            </span>
                            <span className="funnel-stage-value">
                              {data.organic[stage].toLocaleString()}
                              {data.organic[`${stage}WoW`] !== null && data.organic[`${stage}WoW`] !== undefined && (
                                <span className={`metric-change ${data.organic[`${stage}WoW`] > 0 ? 'up' : 'down'}`} style={{fontSize: '0.8rem', marginLeft: '0.5rem'}}>
                                  {formatPercent(data.organic[`${stage}WoW`])}
                                </span>
                              )}
                            </span>
                          </div>
                        </div>
                      </div>
                    );
                  })}
                  <div className="funnel-rate">
                    <span className="funnel-rate-label">Install → Trial Rate</span>
                    <span className="funnel-rate-value">
                      {data.organic.installToTrial.toFixed(1)}%
                      {data.organic.installToTrialWoW !== null && (
                        <span className={`metric-change ${data.organic.installToTrialWoW > 0 ? 'up' : 'down'}`} style={{fontSize: '0.8rem', marginLeft: '0.5rem'}}>
                          {formatPercent(data.organic.installToTrialWoW)}
                        </span>
                      )}
                    </span>
                  </div>
                  <div className="funnel-rate">
                    <span className="funnel-rate-label">Trial → Paid Rate</span>
                    <span className="funnel-rate-value">
                      {data.organic.trialToPaid.toFixed(1)}%
                      {data.organic.trialToPaidWoW !== null && (
                        <span className={`metric-change ${data.organic.trialToPaidWoW > 0 ? 'up' : 'down'}`} style={{fontSize: '0.8rem', marginLeft: '0.5rem'}}>
                          {formatPercent(data.organic.trialToPaidWoW)}
                        </span>
                      )}
                    </span>
                  </div>
                </div>

                <div className="funnel-column">
                  <h3>Total Paid</h3>
                  {['installs', 'trials', 'conversions', 'subs'].map(stage => {
                    const maxValue = stage === 'installs' ? 1500 : stage === 'trials' ? 300 : stage === 'conversions' ? 100 : 60;
                    const width = (data.totalPaid[stage] / maxValue) * 100;
                    return (
                      <div key={stage} className="funnel-stage">
                        <div className="funnel-bar">
                          <div className="funnel-bar-fill" style={{width: `${width}%`}}></div>
                          <div className="funnel-bar-content">
                            <span className="funnel-stage-name">
                              {stage.charAt(0).toUpperCase() + stage.slice(1)}
                            </span>
                            <span className="funnel-stage-value">
                              {data.totalPaid[stage].toLocaleString()}
                              {data.totalPaid[`${stage}WoW`] !== null && data.totalPaid[`${stage}WoW`] !== undefined && (
                                <span className={`metric-change ${data.totalPaid[`${stage}WoW`] > 0 ? 'up' : 'down'}`} style={{fontSize: '0.8rem', marginLeft: '0.5rem'}}>
                                  {formatPercent(data.totalPaid[`${stage}WoW`])}
                                </span>
                              )}
                            </span>
                          </div>
                        </div>
                      </div>
                    );
                  })}
                  <div className="funnel-rate">
                    <span className="funnel-rate-label">Install → Trial Rate</span>
                    <span className="funnel-rate-value">
                      {data.totalPaid.installToTrial.toFixed(1)}%
                      {data.totalPaid.installToTrialWoW !== null && (
                        <span className={`metric-change ${data.totalPaid.installToTrialWoW > 0 ? 'up' : 'down'}`} style={{fontSize: '0.8rem', marginLeft: '0.5rem'}}>
                          {formatPercent(data.totalPaid.installToTrialWoW)}
                        </span>
                      )}
                    </span>
                  </div>
                  <div className="funnel-rate">
                    <span className="funnel-rate-label">Trial → Paid Rate</span>
                    <span className="funnel-rate-value">
                      {data.totalPaid.trialToPaid.toFixed(1)}%
                      {data.totalPaid.trialToPaidWoW !== null && (
                        <span className={`metric-change ${data.totalPaid.trialToPaidWoW > 0 ? 'up' : 'down'}`} style={{fontSize: '0.8rem', marginLeft: '0.5rem'}}>
                          {formatPercent(data.totalPaid.trialToPaidWoW)}
                        </span>
                      )}
                    </span>
                  </div>
                </div>
              </div>
            </div>
          </div>

          <div className={`tab-content ${activeTab === 'comparison' ? 'active' : ''}`}>
            <div className="comparison-charts">
              {renderComparisonChart('Cost Per Install (CPI)', 'cpi')}
              {renderComparisonChart('Cost Per Trial (CPT)', 'cpt')}
              {renderComparisonChart('Customer Acquisition Cost (CAC)', 'cac')}
              {renderROASChart()}
            </div>
          </div>

          <div className={`tab-content ${activeTab === 'mtd' ? 'active' : ''}`}>
            <div className="mtd-grid">
              <div className="mtd-card">
                <div className="mtd-title">March 2026 Performance</div>
                <div className="mtd-stats">
                  <div className="mtd-stat">
                    <div className="mtd-stat-label">MTD Spend</div>
                    <div className="mtd-stat-value">{formatCurrency(Math.round(mtd.mtdSpend))}</div>
                  </div>
                  <div className="mtd-stat">
                    <div className="mtd-stat-label">MTD Revenue</div>
                    <div className="mtd-stat-value">{formatCurrency(Math.round(mtd.mtdRev))}</div>
                  </div>
                  <div className="mtd-stat">
                    <div className="mtd-stat-label">MTD ROAS</div>
                    <div className="mtd-stat-value">{formatROAS(mtd.mtdROAS)}</div>
                  </div>
                  <div className="mtd-stat">
                    <div className="mtd-stat-label">Weeks Tracked</div>
                    <div className="mtd-stat-value">{Object.keys(DATA).filter(w => w.includes('Mar')).length}</div>
                  </div>
                </div>
                <div className="mtd-progress">
                  <div className="mtd-progress-label">Month Progress</div>
                  <div className="mtd-progress-bar">
                    <div className="mtd-progress-fill" style={{width: `${mtd.progressPercent}%`}}></div>
                  </div>
                  <div className="mtd-progress-text">
                    {mtd.daysElapsed} days elapsed • {mtd.daysRemaining} days remaining
                  </div>
                </div>
              </div>

              <div className="mtd-card mtd-projection">
                <div className="mtd-title">End-of-Month Projections</div>
                <div className="mtd-projection-item">
                  <div className="mtd-projection-label">Projected Total Spend</div>
                  <div className="mtd-projection-value">{formatCurrency(Math.round(mtd.projectedSpend))}</div>
                </div>
                <div className="mtd-projection-item">
                  <div className="mtd-projection-label">Projected Total Revenue</div>
                  <div className="mtd-projection-value">{formatCurrency(Math.round(mtd.projectedRev))}</div>
                </div>
                <div className="mtd-projection-item">
                  <div className="mtd-projection-label">Projected ROAS</div>
                  <div className="mtd-projection-value">{formatROAS(mtd.projectedROAS)}</div>
                </div>
              </div>
            </div>

            <div style={{marginTop: '1.5rem'}}>
              <div style={{fontSize: '1.3rem', fontWeight: 700, color: 'white', marginBottom: '1rem'}}>MTD Platform Breakdown</div>
              <div style={{display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: '1.25rem'}}>
                {[
                  {key: 'meta', name: 'Meta', color: '#0084FF'},
                  {key: 'apple', name: 'Apple', color: '#000000'},
                  {key: 'google', name: 'Google', color: '#4285F4'}
                ].map(({key, name, color}) => {
                  const pd = calculateMTDPlatform(key);
                  return (
                    <div key={key} className="mtd-card" style={{position: 'relative', overflow: 'hidden'}}>
                      <div style={{position: 'absolute', top: 0, left: 0, right: 0, height: 4, background: color}}></div>
                      <div className="mtd-title" style={{fontSize: '1.1rem'}}>{name} MTD</div>
                      <div className="mtd-stats">
                        <div className="mtd-stat">
                          <div className="mtd-stat-label">MTD Spend</div>
                          <div className="mtd-stat-value" style={{fontSize: '1.3rem'}}>{formatCurrency(Math.round(pd.mtdSpend))}</div>
                        </div>
                        <div className="mtd-stat">
                          <div className="mtd-stat-label">MTD Installs</div>
                          <div className="mtd-stat-value" style={{fontSize: '1.3rem'}}>{pd.mtdInstalls.toLocaleString()}</div>
                        </div>
                        <div className="mtd-stat">
                          <div className="mtd-stat-label">Avg ROAS</div>
                          <div className="mtd-stat-value" style={{fontSize: '1.3rem', color: pd.mtdROAS >= 1 ? 'var(--success)' : pd.mtdROAS > 0 ? 'var(--red)' : 'var(--mid-green)'}}>{pd.mtdROAS > 0 ? formatROAS(pd.mtdROAS) : '—'}</div>
                        </div>
                        <div className="mtd-stat">
                          <div className="mtd-stat-label">Avg CPI</div>
                          <div className="mtd-stat-value" style={{fontSize: '1.3rem'}}>{pd.avgCPI > 0 ? `A$${pd.avgCPI.toFixed(2)}` : '—'}</div>
                        </div>
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
          </div>

          <div className={`tab-content ${activeTab === 'activation' ? 'active' : ''}`}>
            <div className="summary-cards" style={{gridTemplateColumns: 'repeat(2, 1fr)'}}>
              <div className="summary-card">
                <div className="summary-card-label">Onboarding Completion Rate</div>
                <div className="summary-card-value">{data.onboardingCompletionRate != null ? data.onboardingCompletionRate.toFixed(1) + '%' : '—'}</div>
                <span className={`summary-card-change ${data.onboardingCompletionRateWoW != null ? (data.onboardingCompletionRateWoW >= 0 ? 'positive' : 'negative') : ''}`}>
                  {data.onboardingCompletionRateWoW != null ? (data.onboardingCompletionRateWoW >= 0 ? '+' : '') + data.onboardingCompletionRateWoW + '% WoW' : 'No prior data'}
                </span>
              </div>
              <div className="summary-card">
                <div className="summary-card-label">Activation Rate</div>
                <div className="summary-card-value">{data.activationRate != null ? data.activationRate.toFixed(1) + '%' : '—'}</div>
                <span className={`summary-card-change ${data.activationRateWoW != null ? (data.activationRateWoW >= 0 ? 'positive' : 'negative') : ''}`}>
                  {data.activationRateWoW != null ? (data.activationRateWoW >= 0 ? '+' : '') + data.activationRateWoW + '% WoW' : 'No prior data'}
                </span>
              </div>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.render(<Dashboard />, document.getElementById('root'));
  </script>
</body>
</html>
